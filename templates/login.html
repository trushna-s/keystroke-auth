<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KeyAuth</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-container">
    <div class="auth-box">

        <div style="text-align:center;margin-bottom:28px">
            <h1 style="color:#6c63ff;font-size:28px;
                       margin-bottom:6px">
                🛡️ KeyAuth
            </h1>
            <p class="subtitle">
                Sign in to your workspace
            </p>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text"
                       name="username"
                       required
                       placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password"
                       name="password"
                       required
                       placeholder="Enter password">
            </div>
            <button type="submit"
                    class="btn-primary">
                Sign In →
            </button>
        </form>

        <div style="margin-top:24px;
                    padding-top:20px;
                    border-top:1px solid #333">
            <p style="text-align:center;
                      color:#666;
                      font-size:12px;
                      margin-bottom:14px">
                New to KeyAuth?
            </p>
            <div style="display:grid;
                        grid-template-columns:1fr 1fr;
                        gap:10px">
                <a href="{{ url_for('register_admin') }}"
                   style="display:block;
                          padding:10px;
                          background:#2a2a2a;
                          border:1px solid #444;
                          border-radius:8px;
                          text-align:center;
                          text-decoration:none;
                          color:#aaa;
                          font-size:12px;
                          transition:all 0.2s">
                    🏢 Register Company
                </a>
                <a href="{{ url_for('register_user') }}"
                   style="display:block;
                          padding:10px;
                          background:#2a2a2a;
                          border:1px solid #444;
                          border-radius:8px;
                          text-align:center;
                          text-decoration:none;
                          color:#aaa;
                          font-size:12px;
                          transition:all 0.2s">
                    👤 Join as Employee
                </a>
            </div>
        </div>

    </div>
</div>
</body>
</html>
